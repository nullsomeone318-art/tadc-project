<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TADC - Global Mainframe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        @keyframes crtFlicker { 0% { opacity: 0.98; } 50% { opacity: 0.94; } 100% { opacity: 1; } }

        body { 
            background-color: #050505; background-image: url('./images/backgrund.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #00f2ff; font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; pointer-events: none; }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        .hidden { display: none !important; }
        
        /* ZMNIEJSZONE OKIENKA LOGOWANIA */
        .box { 
            position: relative; background: rgba(10, 10, 15, 0.85); 
            padding: 20px; border: 2px solid #ff0044; border-radius: 12px;
            box-shadow: 0 0 25px #ff0044, inset 0 0 15px rgba(255,0,68,0.3); 
            width: 85%; max-width: 320px; z-index: 10; backdrop-filter: blur(8px); text-align: center;
        }
        .box::before { content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px; border: 2px dashed #00f2ff; border-radius: 14px; z-index: -1; opacity: 0.4; }

        h1 { color: #f9e11e; text-shadow: 0 0 10px rgba(249, 225, 30, 0.5), 2px 2px #ff0044; text-transform: uppercase; margin-top: 0; font-size: 22px; letter-spacing: 1px;}
        
        input { padding: 10px; margin: 10px 0; background: rgba(0, 0, 0, 0.9); border: 2px solid #00f2ff; color: #00f2ff; font-size: 14px; text-align: center; width: 100%; outline: none; border-radius: 5px; box-sizing: border-box;}
        input:focus { border-color: #f9e11e; box-shadow: 0 0 10px #f9e11e; }
        
        button { padding: 10px 15px; background: linear-gradient(45deg, #ff0044, #cc0036); color: #fff; border: none; font-size: 14px; cursor: pointer; font-weight: bold; border-radius: 5px; border-bottom: 3px solid #66001b; transition: 0.2s; width: 100%; box-sizing: border-box;}
        button:hover { background: #f9e11e; color: #000; border-bottom: 3px solid #b3a00b; transform: translateY(2px); }

        .progress-bar-container { width: 100%; height: 15px; border: 2px solid #00f2ff; margin-top: 15px; background: #111; border-radius: 8px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: repeating-linear-gradient(45deg, #00f2ff, #00f2ff 10px, #0099ff 10px, #0099ff 20px); transition: width 0.2s; }
        
        /* TIKTOK STYLE CHAT DASHBOARD */
        #dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 10; background: transparent; }
        
        /* MINI TERMINAL CAINE'A NA GÓRZE */
        #caineTerminal { background: rgba(255, 0, 68, 0.85); border-bottom: 2px solid #fff; padding: 10px; display: flex; gap: 5px; justify-content: center; backdrop-filter: blur(5px); box-shadow: 0 5px 15px rgba(255,0,68,0.5);}
        #caineTerminal input { margin: 0; border: 1px solid #fff; color: #fff; background: #000; text-align: left; padding: 8px; font-weight: bold;}
        #caineTerminal input::placeholder { color: #ff9999; }
        #caineTerminal button { width: auto; background: #000; border: 1px solid #fff; padding: 8px 15px; font-size: 12px;}

        /* NOWOŚĆ: PŁYWAJĄCE OKNO Z LISTĄ KOMEND */
        #cmdWindow { 
            position: absolute; top: 60px; left: 5%; width: 90%; max-width: 400px;
            background: rgba(10, 0, 0, 0.95); border: 2px solid #00f2ff; border-radius: 8px;
            z-index: 200; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }
        .cmd-header { display: flex; justify-content: space-between; padding: 10px; background: #00f2ff; color: #000; font-weight: bold; font-size: 14px; border-top-left-radius: 5px; border-top-right-radius: 5px;}
        .cmd-header button { background: #000; color: #00f2ff; border: 1px solid #000; font-weight: bold; padding: 2px 8px; cursor: pointer; border-radius: 3px; width: auto;}
        .cmd-header button:hover { background: #ff0044; color: #fff; border-color: #ff0044; }
        .cmd-list { padding: 10px; max-height: 40vh; overflow-y: auto; text-align: left; font-size: 12px; color: #fff; scrollbar-width: thin; scrollbar-color: #00f2ff #000;}
        .cmd-list div { padding: 8px 0; border-bottom: 1px dashed #333; }
        .cmd-list div:hover { background: rgba(0, 242, 255, 0.1); }
        .cmd-real { color: #f9e11e; font-weight: bold; font-size: 14px; }
        .cmd-desc { color: #aaa; margin-left: 5px;}

        /* STREFA CZATU */
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; padding-bottom: 60px; overflow: hidden; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 60%); }
        .chat-box { max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; scrollbar-width: none; }
        
        .msg { font-size: 14px; text-shadow: 1px 1px 2px #000, 0px 0px 5px #000; word-wrap: break-word; animation: slideIn 0.3s ease-out; line-height: 1.3;}
        .msg .nick { font-weight: bold; margin-right: 5px; color: #fff; text-shadow: 1px 1px 0px #000;}
        .msg.sys { color: #f9e11e; font-style: italic; font-size: 12px; }
        .msg.caine .nick { color: #ff0044; text-transform: uppercase; border: 1px solid #ff0044; padding: 0 4px; border-radius: 4px; background: rgba(255,0,68,0.3); }
        .msg.caine .text { color: #ff9999; font-weight: bold; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .chat-controls { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.8); display: flex; gap: 5px; box-sizing: border-box; border-top: 1px solid #333;}
        .chat-controls input { margin: 0; flex-grow: 1; text-align: left; padding: 10px; border-radius: 20px; font-size: 14px;}
        .chat-controls button { width: auto; padding: 10px 15px; border-radius: 20px; font-size: 12px; background: #00f2ff; color: #000; border: none; }

        /* HUD & EFFECTS */
        .hud { position: fixed; top: 10px; left: 10px; font-size: 10px; color: #f9e11e; font-weight: bold; z-index: 110; text-shadow: 1px 1px #000; opacity: 0.6;}
        .audio-btn { position: fixed; top: 10px; right: 10px; font-size: 20px; cursor: pointer; z-index: 110; filter: drop-shadow(0 0 5px #000); }
        .super-glitch { animation: shake 0.1s infinite; filter: hue-rotate(90deg) invert(20%); }
        @keyframes shake { 0% { transform: translate(5px, 5px) rotate(1deg); } 50% { transform: translate(-5px, -5px) rotate(-1deg); } 100% { transform: translate(5px, -5px) rotate(1deg); } }
        .red-alert { background-image: linear-gradient(rgba(255, 0, 0, 0.5), rgba(255, 0, 0, 0.5)), url('./images/backgrund.jpg') !important; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div class="scanlines"></div>
    <div class="audio-btn" id="audioBtn" onclick="toggleMusic()">🔇</div>

    <div class="hud">
        <span id="network">STATUS: OFFLINE</span>
    </div>

    <audio id="bgMusic" loop><source src="./music/maintheme.mp3" type="audio/mpeg"></audio>

    <div id="step-1" class="box">
        <h1>CYFROWY CYRK</h1>
        <p style="color: #fff; font-size: 12px;">Wprowadź tożsamość:</p>
        <input type="text" id="nickInput" placeholder="Imię awatara..." oninput="checkIfCaine()">
        <br>
        <button id="startBtn" onclick="startTransfer(false)">DOŁĄCZ</button>

        <div id="admin-login" class="hidden">
            <p style="color: #ff0044; font-weight: bold; font-size: 12px; animation: crtFlicker 1s infinite;">[ AUTORYZACJA ]</p>
            <input type="password" id="pinInput" placeholder="KOD...">
            <br>
            <button onclick="loginAdmin()">WEJDŹ (CAINE)</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <h1 id="loadingTitle" style="font-size: 18px;">ŁADOWANIE...</h1>
        <p id="targetName" style="color: #fff; font-weight: bold; font-size: 14px;"></p>
        <div class="progress-bar-container"><div id="progressFill" class="progress-fill"></div></div>
        <p id="loadText" style="color: #f9e11e; font-size: 12px; margin-top: 10px;">Łączenie z serwerem MQTT...</p>
    </div>

    <div id="dashboard" class="hidden">
        
        <div id="caineTerminal" class="hidden">
            <span style="color:#fff; font-weight:bold; font-size:12px; align-self:center;">ROOT:</span>
            <input type="text" id="cmdInput" placeholder="np. cmd, /glitch..." onkeypress="if(event.key === 'Enter') executeCommand()">
            <button onclick="executeCommand()">EXE</button>
        </div>

        <div id="cmdWindow" class="hidden">
            <div class="cmd-header">
                <span>💻 BAZA DANYCH ROOT (120 MODUŁÓW)</span>
                <button onclick="toggleCmdWindow()">ZWIŃ [X]</button>
            </div>
            <div id="cmdList" class="cmd-list"></div>
        </div>

        <div class="chat-container">
            <div id="chatBox" class="chat-box"></div>
        </div>
        
        <div class="chat-controls">
            <input type="text" id="chatInput" placeholder="Napisz coś..." onkeypress="if(event.key === 'Enter') sendGlobalMessage()">
            <button onclick="sendGlobalMessage()">Wyślij</button>
        </div>

    </div>

    <script>
        // --- MUZYKA & EFEKTY ---
        const music = document.getElementById('bgMusic');
        const audioBtn = document.getElementById('audioBtn');
        function toggleMusic() { if (music.paused) { music.play(); audioBtn.innerText = '🔊'; } else { music.pause(); audioBtn.innerText = '🔇'; } }
        const startAudioOnInteraction = () => { if (music.paused) { music.play().then(() => { audioBtn.innerText = '🔊'; }).catch(()=>{}); } document.removeEventListener('click', startAudioOnInteraction); document.removeEventListener('touchstart', startAudioOnInteraction); };
        document.addEventListener('click', startAudioOnInteraction); document.addEventListener('touchstart', startAudioOnInteraction);

        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ'; const drops = []; let speedMultiplier = 1;
        for(let x = 0; x < canvas.width/20; x++) drops[x] = 1;
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0044'; ctx.font = '15px Courier';
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * 20, drops[i] * 20);
                if(drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i] += speedMultiplier;
            }
        }
        setInterval(drawMatrix, 50);

        // --- GLOBALNY MQTT ---
        let mqttClient;
        const globalTopic = "cyfrowycyrk/globalchat/room1";
        let currentUser = ""; let isAdminActive = false;
        let userColor = `hsl(${Math.random() * 360}, 100%, 70%)`;

        function initMQTT() {
            const clientId = "Cyrk_" + Math.random().toString(16).substr(2, 8);
            mqttClient = new Paho.MQTT.Client("broker.emqx.io", 8084, clientId);
            mqttClient.onConnectionLost = () => { document.getElementById('network').innerText = "STATUS: OFFLINE"; };
            mqttClient.onMessageArrived = (msg) => { handleIncomingData(msg.payloadString); };
            mqttClient.connect({
                useSSL: true,
                onSuccess: () => {
                    document.getElementById('network').innerText = "STATUS: GLOBAL ONLINE";
                    mqttClient.subscribe(globalTopic);
                    let joinMsg = isAdminActive ? "CAINE ZALOGOWAŁ SIĘ DO SYSTEMU." : `Gracz [${currentUser}] dołączył.`;
                    broadcastData({ type: "system", text: joinMsg });
                },
                onFailure: (err) => console.log("Błąd MQTT:", err)
            });
        }

        function broadcastData(dataObj) {
            if(!mqttClient || !mqttClient.isConnected()) return;
            const msg = new Paho.MQTT.Message(JSON.stringify(dataObj));
            msg.destinationName = globalTopic; mqttClient.send(msg);
        }

        function handleIncomingData(payload) {
            try {
                const data = JSON.parse(payload);
                if(data.type === "chat") { displayChat(data.nick, data.text, data.color, data.isAdmin); } 
                else if(data.type === "system") { displaySys(data.text); }
                else if(data.type === "command") { executeRemoteEffect(data.cmd); }
            } catch(e) {}
        }

        // --- LOGOWANIE ---
        function checkIfCaine() {
            const nick = document.getElementById('nickInput').value.trim().toUpperCase();
            if(nick === 'CAINE') { document.getElementById('startBtn').classList.add('hidden'); document.getElementById('admin-login').classList.remove('hidden'); } 
            else { document.getElementById('startBtn').classList.remove('hidden'); document.getElementById('admin-login').classList.add('hidden'); }
        }

        function loginAdmin() {
            if(document.getElementById('pinInput').value === "2222") { startTransfer(true); } else { alert("BŁĄD KODU."); }
        }

        function startTransfer(isAdmin) {
            isAdminActive = isAdmin;
            const nick = isAdmin ? "CAINE" : (document.getElementById('nickInput').value.trim() || "Zguba");
            currentUser = nick.toUpperCase();
            
            document.getElementById('step-1').classList.add('hidden'); document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('targetName').innerText = "PROFIL: " + currentUser;

            let progress = 0; const fill = document.getElementById('progressFill');
            initMQTT(); 

            const interval = setInterval(() => {
                progress += 10; fill.style.width = progress + "%";
                if(progress >= 100) {
                    clearInterval(interval);
                    document.getElementById('step-2').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden');
                    if(isAdminActive) { document.getElementById('caineTerminal').classList.remove('hidden'); }
                }
            }, 200);
        }

        function displayChat(nick, text, color, isCaine) {
            const box = document.getElementById('chatBox');
            let cssClass = isCaine ? "msg caine" : "msg";
            let nickStyle = isCaine ? "" : `style="color: ${color};"`;
            box.innerHTML += `<div class="${cssClass}"><span class="nick" ${nickStyle}>${nick}:</span><span class="text">${text}</span></div>`;
            box.scrollTop = box.scrollHeight;
        }

        function displaySys(text) {
            const box = document.getElementById('chatBox'); box.innerHTML += `<div class="msg sys">${text}</div>`; box.scrollTop = box.scrollHeight;
        }

        function sendGlobalMessage() {
            const input = document.getElementById('chatInput'); const text = input.value.trim();
            if(!text) return;
            broadcastData({ type: "chat", nick: currentUser, text: text, color: userColor, isAdmin: isAdminActive });
            input.value = "";
        }

        // ==========================================
        // 🔥 TERMINAL & SYSTEM KOMEND (UI) 🔥
        // ==========================================
        const realCommands = [
            { cmd: "/glitch", desc: "Awaria ekranu u wszystkich graczy na serwerze." },
            { cmd: "/redalert", desc: "Odpala globalny czerwony alarm (efekt na całym świecie)." },
            { cmd: "/matrix", desc: "Przyspiesza deszcz kodu w tle." },
            { cmd: "/clear", desc: "Czyści lokalną historię terminala (tylko u Ciebie)." },
            { cmd: "/ban_soul", desc: "[ZABLOKOWANE] Wymagane fizyczne usunięcie headsetu." },
            { cmd: "/spawn_gloink", desc: "[BŁĄD] Silnik 3D nie odpowiada." },
            { cmd: "/delete_exit", desc: "Usunięcie drzwi wyjściowych zakończone sukcesem." }
        ];

        function populateAndShowCmdWindow() {
            const win = document.getElementById('cmdWindow');
            const list = document.getElementById('cmdList');
            win.classList.remove('hidden');
            list.innerHTML = "";

            let html = "";
            // Dodaj prawdziwe / fabularne komendy
            realCommands.forEach(c => {
                 html += `<div><span class="cmd-real">${c.cmd}</span> <span class="cmd-desc">- ${c.desc}</span></div>`;
            });
            // Wypełnij resztę pętlą, żeby wyglądało na 120 potężnych modułów
            for(let i = realCommands.length + 1; i <= 120; i++) {
                let hexName = "MOD_" + (Math.random() * 0xFFFFFF << 0).toString(16).toUpperCase();
                html += `<div><span style="color:#0088cc">/${hexName}</span> <span class="cmd-desc">- [DANE ZASZYFROWANE]</span></div>`;
            }
            list.innerHTML = html;
        }

        function toggleCmdWindow() {
            document.getElementById('cmdWindow').classList.add('hidden');
        }

        function executeCommand() {
            const input = document.getElementById('cmdInput');
            const cmdText = input.value.trim().toLowerCase();
            if(!cmdText) return;

            // Wywołanie listy komend (Słowa kluczowe: cmd, /cmd, help, /help)
            if(cmdText === 'cmd' || cmdText === '/cmd' || cmdText === 'help' || cmdText === '/help') {
                populateAndShowCmdWindow();
                input.value = "";
                return;
            }

            displaySys(`> CAINE-OS: ${cmdText}`);

            if(cmdText === '/clear') { document.getElementById('chatBox').innerHTML = ""; }
            else if(cmdText === '/glitch' || cmdText === '/redalert' || cmdText === '/matrix') {
                broadcastData({ type: "command", cmd: cmdText.substring(1) }); 
            }
            else {
                displaySys(`Moduł [${cmdText}] został wysłany do kolejki. Brak uprawnień do natychmiastowej egzekucji.`);
            }
            input.value = "";
        }

        function executeRemoteEffect(cmd) {
            if(cmd === "glitch") {
                document.body.classList.add('super-glitch'); setTimeout(() => document.body.classList.remove('super-glitch'), 3000);
            }
            else if(cmd === "redalert") {
                document.body.classList.add('red-alert'); displaySys("⚠️ UWAGA: KRYTYCZNY BŁĄD SYSTEMU ⚠️"); setTimeout(() => document.body.classList.remove('red-alert'), 5000);
            }
            else if(cmd === "matrix") { speedMultiplier = 4; setTimeout(() => speedMultiplier = 1, 4000); }
        }
    </script>
</body>
</html>
