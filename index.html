<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TADC Digital Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #ff0044; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #f9e11e; padding: 20px; display: inline-block; background: #111; }
        input { padding: 10px; margin: 10px; border: 1px solid #f9e11e; background: #000; color: #fff; }
        button { padding: 10px 20px; background: #ff0044; color: #fff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>TADC INSTALLER</h1>
        <p>Podaj imię postaci:</p>
        <input type="text" id="charName" placeholder="Twoje imię...">
        <br>
        <button onclick="checkSystem()">DALEJ</button>
        <p id="msg"></p>
    </div>

    <script>
        function checkSystem() {
            const name = document.getElementById('charName').value;
            if(!name) { alert("Wpisz imię!"); return; }
            
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const msg = document.getElementById('msg');

            if (isAndroid) {
                msg.innerHTML = "WYKRYTO ANDROID.<br>Kliknij 'Zainstaluj' w menu przeglądarki.";
            } else if (isiOS) {
                msg.innerHTML = "WYKRYTO iOS.<br>Kliknij 'Udostępnij' i 'Do ekranu początkowego'.";
            } else {
                msg.innerHTML = "WITAJ " + name + " (PC)!";
            }
        }

        // Rejestracja Service Workera dla PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
