<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TADC - Digital Gateway v2.3</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background-color: #050505;
            background-image: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.8)), url('images/backgrund.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #00f2ff; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            overflow: hidden;
        }

        .hidden { display: none !important; }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        
        .box { 
            border: 4px solid #ff0044; 
            background: rgba(10, 10, 15, 0.9); 
            padding: 30px; 
            box-shadow: 0 0 20px #ff0044; 
            max-width: 400px; 
            width: 85%; 
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        h1 { color: #f9e11e; text-shadow: 2px 2px #ff0044; text-transform: uppercase; margin-top: 0; }
        
        input { 
            padding: 12px; margin: 15px 0; background: #000; border: 2px solid #00f2ff; 
            color: #00f2ff; font-size: 16px; text-align: center; width: 85%; outline: none;
        }
        
        button { 
            padding: 12px 25px; background: #ff0044; color: #fff; border: none; 
            font-size: 16px; cursor: pointer; font-weight: bold; text-transform: uppercase;
            border-bottom: 4px solid #990029; transition: 0.2s;
        }
        button:hover { background: #f9e11e; color: #000; transform: scale(1.05); }

        .progress-bar-container { width: 100%; height: 15px; border: 1px solid #00f2ff; margin-top: 20px; background: #000; }
        .progress-fill { height: 100%; width: 0%; background: #00f2ff; transition: width 0.2s; }
        
        .hud { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 12px; color: #f9e11e; }
        .audio-btn { position: fixed; bottom: 10px; left: 15px; font-size: 24px; cursor: pointer; z-index: 110; }

        @keyframes glitch { 0% { transform: translate(2px, -2px); } 50% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
        .glitch-active { animation: glitch 0.2s infinite; color: #ff0044; font-weight: bold; }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="audio-btn" id="audioBtn" onclick="toggleMusic()">🔇</div>

    <div class="hud">
        <span id="clock">00:00:00</span>
        <span id="network">STATUS: ONLINE</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="maintheme.mp3" type="audio/mpeg">
    </audio>

    <div id="step-1" class="box">
        <h1>CYFROWY CYRK</h1>
        <p>Podaj imię swojego awatara:</p>
        <input type="text" id="nickInput" placeholder="Imię..." oninput="checkCaine()">
        <br>
        <button id="startBtn" onclick="startTransfer()">DOŁĄCZ DO CYRKU</button>

        <div id="admin-login" class="hidden">
            <p style="color: #ff0044;">[ WYKRYTO KONTO ADMINISTRATORA ]</p>
            <input type="password" id="pinInput" placeholder="WPROWADŹ PIN...">
            <br>
            <button onclick="loginAdmin()">AUTORYZUJ</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <h1>ŁADOWANIE...</h1>
        <p id="targetName"></p>
        <div class="progress-bar-container"><div id="progressFill" class="progress-fill"></div></div>
        <p id="loadText" style="color: #f9e11e; font-size: 14px; margin-top: 10px;">Inicjalizacja dusz...</p>
    </div>

    <div id="step-3" class="box hidden">
        <h1 style="color: #00f2ff;">TRANSFER OK</h1>
        <p>Witaj, <span id="finalName" style="color: #f9e11e;"></span>!</p>
        <p style="border: 1px dashed #f9e11e; padding: 10px; font-size: 14px;">Zainstaluj aplikację przez menu przeglądarki (Dodaj do ekranu głównego).</p>
        <button onclick="location.reload()">RESTART</button>
    </div>

    <script>
        // --- ZEGAR ---
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // --- MUZYKA ---
        const music = document.getElementById('bgMusic');
        const audioBtn = document.getElementById('audioBtn');
        function toggleMusic() {
            if (music.paused) { music.play(); audioBtn.innerText = '🔊'; }
            else { music.pause(); audioBtn.innerText = '🔇'; }
        }

        // --- LOGIKA ---
        function checkCaine() {
            const nick = document.getElementById('nickInput').value.toLowerCase();
            if(nick === 'caine') {
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('admin-login').classList.remove('hidden');
            } else {
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('admin-login').classList.add('hidden');
            }
        }

        function loginAdmin() {
            // Kod wciąż działa, ale nie jest widoczny dla zwykłych graczy
            if(document.getElementById('pinInput').value === "2222") {
                alert("Autoryzacja pomyślna. Witaj, Szefie!");
                startTransfer("CAINE");
            } else { alert("BŁĘDNY PIN! DOSTĘP ODMOWIONY."); }
        }

        function startTransfer(adminNick) {
            const nick = adminNick || document.getElementById('nickInput').value.trim() || "Nieznajomy";
            
            // Start muzyki przy kliknięciu
            music.play();
            audioBtn.innerText = '🔊';

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('targetName').innerText = "PROFIL: " + nick.toUpperCase();

            let progress = 0;
            const fill = document.getElementById('progressFill');
            const loadText = document.getElementById('loadText');

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 2;
                if(progress > 100) progress = 100;
                fill.style.width = progress + "%";

                if(progress > 30) loadText.innerText = "Skanowanie świadomości...";
                if(progress > 70) loadText.innerText = "Usuwanie drogi wyjścia...";

                if(progress === 100) {
                    clearInterval(interval);
                    loadText.innerHTML = "<span class='glitch-active'>BŁĄD: NIE MOŻNA ZNALEŹĆ WYJŚCIA</span>";
                    setTimeout(() => {
                        document.getElementById('step-2').classList.add('hidden');
                        document.getElementById('step-3').classList.remove('hidden');
                        document.getElementById('finalName').innerText = nick;
                    }, 2500);
                }
            }, 300);
        }
    </script>
</body>
</html>
