<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TADC - Global Mainframe OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        @keyframes crtFlicker { 0% { opacity: 0.98; } 50% { opacity: 0.94; } 100% { opacity: 1; } }
        body { 
            background-color: #050505; background-image: url('./images/backgrund.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #00f2ff; font-family: 'Courier New', monospace; 
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center; transition: all 0.5s;
        }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.3; pointer-events: none; }
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        .hidden { display: none !important; }
        .box { 
            position: relative; background: rgba(10, 10, 15, 0.9); padding: 20px; border: 2px solid #ff0044; border-radius: 12px;
            box-shadow: 0 0 25px #ff0044, inset 0 0 15px rgba(255,0,68,0.3); width: 85%; max-width: 310px; z-index: 10; backdrop-filter: blur(8px); text-align: center;
        }
        h1 { color: #f9e11e; text-shadow: 2px 2px #ff0044; text-transform: uppercase; font-size: 20px; margin-top: 0; }
        input { padding: 10px; margin: 10px 0; background: #000; border: 2px solid #00f2ff; color: #00f2ff; width: 100%; box-sizing: border-box; text-align: center; }
        button { padding: 10px; background: #ff0044; color: #fff; border: none; font-weight: bold; width: 100%; cursor: pointer; border-bottom: 3px solid #66001b; }
        .progress-bar-container { width: 100%; height: 15px; border: 2px solid #00f2ff; margin-top: 15px; background: #111; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #00f2ff; transition: width 0.3s; }
        #dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 10; }
        #caineTerminal { background: rgba(255, 0, 68, 0.9); padding: 8px; display: flex; gap: 5px; justify-content: center; }
        .chat-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; padding-bottom: 80px; }
        .chat-box { max-height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .msg { font-size: 13px; text-shadow: 1px 1px 1px #000; }
        .msg.caine { color: #ff0044; font-weight: bold; }
        .chat-controls { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.8); display: flex; gap: 5px; box-sizing: border-box; }
        .hologram-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 80%; max-width: 300px; z-index: 1000; border: 3px solid #ff0044; transition: 0.4s; pointer-events: none; }
        .hologram-popup.active { transform: translate(-50%, -50%) scale(1); }
        .audio-btn { position: fixed; top: 12px; right: 12px; font-size: 20px; z-index: 110; cursor: pointer; }
    </style>
</head>
<body>
    <img id="hologramImg" class="hologram-popup" src="" alt="Entity">
    <canvas id="matrix"></canvas>
    <div class="scanlines"></div>
    <div class="audio-btn" id="audioBtn" onclick="toggleMusic()">🔇</div>
    <audio id="bgMusic" loop preload="auto"><source src="./music/maintheme.mp3" type="audio/mpeg"></audio>

    <div id="step-1" class="box">
        <h1>CYFROWY CYRK</h1>
        <input type="text" id="nickInput" placeholder="Imię..." oninput="checkIfCaine()">
        <button id="startBtn" onclick="start(false)">WEJDŹ</button>
        <div id="admin-login" class="hidden">
            <p style="color: #ff0044; font-weight: bold; font-size: 11px;">AUTORYZACJA BOGA</p>
            <input type="password" id="pinInput" placeholder="PIN">
            <button onclick="loginAdmin()">LOGIN</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <h1>TRANSFER...</h1>
        <div class="progress-bar-container"><div id="progressFill" class="progress-fill"></div></div>
        <p id="loadText" style="color: #f9e11e; font-size: 11px;">Łączenie z serwerem...</p>
    </div>

    <div id="dashboard" class="hidden">
        <div id="caineTerminal" class="hidden">
            <input type="text" id="cmdInputTop" placeholder="Komenda...">
            <button onclick="exeTop()">EXE</button>
        </div>
        <div class="chat-container"><div id="chatBox" class="chat-box"></div></div>
        <div class="chat-controls">
            <input type="text" id="chatInput" placeholder="Napisz wiadomość...">
            <button onclick="handleChat()">SND</button>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const audioBtn = document.getElementById('audioBtn');
        
        function toggleMusic() {
            if (music.paused) { music.play(); audioBtn.innerText = '🔊'; }
            else { music.pause(); audioBtn.innerText = '🔇'; }
        }

        // Naprawa muzyki: startuje przy pierwszym kliknięciu gdziekolwiek
        document.addEventListener('click', () => {
            if(music.paused) { music.play(); audioBtn.innerText = '🔊'; }
        }, {once: true});

        const canvas = document.getElementById('matrix'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = []; for(let x = 0; x < canvas.width/20; x++) drops[x] = 1;
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#ff0044'; ctx.font = '15px Courier';
            drops.forEach((y, i) => {
                ctx.fillText('01'[Math.floor(Math.random()*2)], i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i] += 1;
            });
        }
        setInterval(drawMatrix, 50);

        let mqtt; const topic = "cyfrowycyrk/globalchat/final_v2";
        let user = ""; let isAdmin = false;

        function initMQTT() {
            try {
                mqtt = new Paho.MQTT.Client("broker.emqx.io", 8084, "Cyrk_"+Math.random().toString(16).slice(2,10));
                mqtt.onMessageArrived = (m) => {
                    const d = JSON.parse(m.payloadString);
                    const b = document.getElementById('chatBox');
                    if(d.type === "chat") {
                        b.innerHTML += `<div class="msg ${d.admin?'caine':''}"><b style="color:${d.color}">${d.nick}:</b> ${d.text}</div>`;
                    } else if(d.type === "cmd") {
                        runEff(d.cmd);
                    }
                    b.scrollTop = b.scrollHeight;
                };
                mqtt.connect({useSSL:true, timeout: 3, onSuccess:() => {
                    mqtt.subscribe(topic);
                    const msg = new Paho.MQTT.Message(JSON.stringify({type:"chat", nick:"SYSTEM", text:user+" dołączył!", color:"#f9e11e"}));
                    msg.destinationName = topic; mqtt.send(msg);
                }});
            } catch(e) { console.log("MQTT Error - Offline Mode"); }
        }

        function checkIfCaine() {
            const v = document.getElementById('nickInput').value.toLowerCase();
            document.getElementById('startBtn').classList.toggle('hidden', v==='caine');
            document.getElementById('admin-login').classList.toggle('hidden', v!=='caine');
        }

        function loginAdmin() { 
            if(document.getElementById('pinInput').value === "2222") start(true); 
            else alert("WRONG PIN"); 
        }

        function start(admin) {
            isAdmin = admin; user = (admin ? "CAINE" : document.getElementById('nickInput').value.trim() || "Zguba").toUpperCase();
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            initMQTT();
            
            let p = 0;
            const f = document.getElementById('progressFill');
            const inv = setInterval(() => {
                p += 5; f.style.width = p+"%";
                if(p >= 100) {
                    clearInterval(inv);
                    document.getElementById('step-2').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    if(isAdmin) document.getElementById('caineTerminal').classList.remove('hidden');
                }
            }, 50);
        }

        function handleChat() {
            const i = document.getElementById('chatInput');
            if(!i.value.trim() || !mqtt || !mqtt.isConnected()) return;
            const data = {type:"chat", nick:user, text:i.value, color: isAdmin?"#ff0044":"#00f2ff", admin:isAdmin};
            const m = new Paho.MQTT.Message(JSON.stringify(data));
            m.destinationName = topic; mqtt.send(m);
            i.value="";
        }

        function exeTop() {
            const i = document.getElementById('cmdInputTop');
            const cmd = i.value.replace('/','').toLowerCase();
            if(mqtt && mqtt.isConnected()) {
                const m = new Paho.MQTT.Message(JSON.stringify({type:"cmd", cmd:cmd}));
                m.destinationName = topic; mqtt.send(m);
            }
            i.value="";
        }

        function runEff(c) {
            const b = document.body;
            const h = document.getElementById('hologramImg');
            if(c === "bubble") { h.src='./images/bubble.jpg'; h.classList.add('active'); setTimeout(()=>h.classList.remove('active'),3000); }
            if(c === "gloink") { h.src=`./images/gloink${Math.floor(Math.random()*3)+1}.jpg`; h.classList.add('active'); setTimeout(()=>h.classList.remove('active'),3000); }
            if(c === "glitch") { b.style.filter = "hue-rotate(90deg) invert(1)"; setTimeout(()=>b.style.filter="none", 1000); }
            if(c === "nuke") { b.style.filter = "brightness(5)"; setTimeout(()=>b.style.filter="none", 1000); }
        }
    </script>
</body>
</html>
