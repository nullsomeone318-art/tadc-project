<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TADC - Global Mainframe OS v15</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        @keyframes crtFlicker { 0% { opacity: 0.98; } 50% { opacity: 0.94; } 100% { opacity: 1; } }
        @keyframes breatheGlow { 0% { box-shadow: 0 0 20px rgba(255,0,68,0.4), inset 0 0 10px rgba(255,0,68,0.2); } 50% { box-shadow: 0 0 40px rgba(255,0,68,0.7), inset 0 0 20px rgba(255,0,68,0.4); } 100% { box-shadow: 0 0 20px rgba(255,0,68,0.4), inset 0 0 10px rgba(255,0,68,0.2); } }
        @keyframes textBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes audioPulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }
        @keyframes miniShake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        body { 
            background-color: #050505; background-image: url('./images/backgrund.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center; transition: all 0.3s;
        }

        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); background-size: 100% 4px; pointer-events: none; z-index: 50; }
        .hidden { display: none !important; opacity: 0; transform: scale(0.9) !important; pointer-events: none; }

        .box { 
            position: relative; background: rgba(10, 10, 15, 0.95); padding: 25px; border: 2px solid #ff0044; border-radius: 12px;
            width: 85%; max-width: 320px; z-index: 100; text-align: center;
            animation: breatheGlow 3s infinite ease-in-out; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        h1 { color: #f9e11e; text-shadow: 2px 2px #ff0044; text-transform: uppercase; font-size: 24px; margin-top: 0; letter-spacing: 2px;}
        input { padding: 12px; margin: 10px 0; background: #000; border: 2px solid #00f2ff; color: #00f2ff; width: 100%; box-sizing: border-box; text-align: center; font-weight: bold; font-family: 'Courier New', monospace; outline: none; transition: 0.2s;}
        input:focus { border-color: #f9e11e; box-shadow: 0 0 10px #f9e11e; }
        button { padding: 12px; background: linear-gradient(45deg, #ff0044, #cc0036); color: #fff; border: none; font-weight: bold; width: 100%; cursor: pointer; border-bottom: 4px solid #66001b; font-family: 'Courier New', monospace; text-transform: uppercase; transition: 0.2s;}
        button:hover { background: #f9e11e; color: #000; border-bottom: 4px solid #b3a00b; transform: translateY(-2px);}

        .progress-bar-container { width: 100%; height: 20px; border: 2px solid #00f2ff; margin-top: 20px; background: #111; overflow: hidden; border-radius: 5px;}
        .progress-fill { height: 100%; width: 0%; background: repeating-linear-gradient(45deg, #00f2ff, #00f2ff 10px, #0099ff 10px, #0099ff 20px); transition: width 0.2s; }

        #dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 60; display: flex; flex-direction: column; transition: 0.5s;}
        
        #caineTerminal { background: rgba(255, 0, 68, 0.95); padding: 10px; display: flex; gap: 5px; justify-content: center; border-bottom: 2px solid #fff; flex-shrink: 0; animation: breatheGlow 3s infinite ease-in-out; z-index: 10;}
        #caineTerminal input { margin: 0; background: #000; border: 1px solid #fff; color: #fff; width: 70%; padding: 8px;}
        #caineTerminal button { width: 30%; background: #000; padding: 8px; border: 1px solid #fff; color: #fff;}

        /* WSPÓLNY STYL OKIENEK POPUP */
        .popup-window { 
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 95%; max-width: 550px;
            background: rgba(5, 5, 10, 0.98); border: 2px solid #00f2ff; border-radius: 8px;
            z-index: 2000; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cmd-header { display: flex; justify-content: space-between; padding: 10px; background: #00f2ff; color: #000; font-weight: bold; font-size: 14px;}
        .cmd-header button { background: #000; color: #00f2ff; border: 1px solid #000; font-weight: bold; padding: 2px 8px; cursor: pointer;}
        .cmd-list { padding: 10px; max-height: 55vh; overflow-y: auto; text-align: left; font-size: 12px; color: #fff; scrollbar-width: thin; scrollbar-color: #00f2ff #000;}
        .cmd-list div { padding: 8px 0; border-bottom: 1px dashed #333; display: flex; flex-direction: column;}
        .cmd-real { color: #f9e11e; font-weight: bold; font-size: 14px; }
        .cmd-desc { color: #aaa; font-style: italic; margin-top: 3px;}

        #adventureModal .cmd-list { padding: 20px; text-align: center; }
        #advThemeInput { width: 90%; padding: 10px; margin-bottom: 15px; border: 1px solid #f9e11e; background: #111; color: #fff; font-weight: bold;}
        #advBtn { background: #f9e11e; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px;}

        .chat-box { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: #00f2ff #111; padding-right: 5px;}
        
        @keyframes popIn { from { opacity: 0; transform: translateY(15px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes caineShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(1px); } 75% { transform: translateX(-1px); } }

        .msg { font-size: 14px; text-shadow: 1px 1px 2px #000; background: rgba(0,0,0,0.6); padding: 7px 12px; border-radius: 8px; border-left: 3px solid #00f2ff; width: fit-content; max-width: 90%; word-break: break-word; overflow-wrap: break-word; animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; line-height: 1.4;}
        .msg.caine { border-left: 3px solid #ff0044; background: rgba(255,0,68,0.15); font-weight: bold; animation: popIn 0.3s forwards, caineShake 0.1s infinite; }
        .msg.sys { border-left: 3px solid #f9e11e; color: #f9e11e; font-style: italic; background: rgba(249,225,30,0.15); width: 100%; max-width: 100%; text-align: center; animation: popIn 0.3s forwards, textBlink 1.5s infinite; border-right: 3px solid #f9e11e;}

        .inline-censor { height: 2.2em; vertical-align: middle; border-radius: 4px; border: 1px solid #ff0044; margin: 0 4px; transform: rotate(-3deg); animation: crtFlicker 0.2s infinite, miniShake 0.1s infinite; }

        .chat-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 15px; padding-bottom: 80px; transition: transform 2s ease-in-out; }
        .chat-controls { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.9); display: flex; gap: 10px; box-sizing: border-box; border-top: 2px solid #333;}
        .chat-controls input { margin: 0; border-radius: 20px; background: #111; border: 1px solid #555; text-align: left; padding-left: 15px;}
        .chat-controls button { width: auto; border-radius: 20px; padding: 10px 20px; background: #00f2ff; color: #000; border-bottom: 3px solid #0088cc;}

        @media (min-width: 768px) {
            #dashboard { justify-content: center; align-items: center; padding: 20px; }
            #caineTerminal { width: 80%; max-width: 800px; border-radius: 10px 10px 0 0; border-bottom: none; }
            .chat-container { width: 80%; max-width: 800px; height: 75vh; background: rgba(10, 10, 15, 0.95); border: 2px solid #00f2ff; border-radius: 12px; padding: 20px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); display: flex; flex-direction: column; justify-content: space-between; flex-grow: 0; animation: breatheGlow 3s infinite ease-in-out;}
            .chat-controls { position: relative; width: 100%; background: transparent; padding: 0; border-top: none; }
            .chat-controls input { border-radius: 8px; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; text-align: left;}
            .chat-controls button { border-radius: 8px; padding: 12px 25px; }
        }

        .hologram-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 85%; max-width: 350px; z-index: 1000; border: none; border-radius: 0; box-shadow: 0 0 60px 10px rgba(255, 0, 68, 0.7); transition: 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); pointer-events: none; opacity: 0; }
        .hologram-popup.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        @keyframes entityFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
        .falling-gloink { position: fixed; top: -10vh; width: 60px; height: 60px; z-index: 1001; pointer-events: none; filter: drop-shadow(0 0 5px #ff0044); animation: entityFall 3s linear forwards; }
        .falling-confetti { position: fixed; top: -10vh; width: 10px; height: 10px; border-radius: 50%; z-index: 1001; pointer-events: none; animation: entityFall 2s linear forwards; }

        #censorBar { position: fixed; top: 50%; left: 0; width: 100%; height: 120px; background: repeating-linear-gradient(45deg, #000, #000 20px, #fff 20px, #fff 40px); transform: translateY(-50%) scaleY(0); z-index: 3000; display: flex; justify-content: center; align-items: center; transition: 0.1s; pointer-events: none;}
        #censorBar.active { transform: translateY(-50%) scaleY(1); pointer-events: auto;}
        #censorBar span { background: #ff0044; color: #fff; padding: 10px 30px; font-size: 40px; font-weight: bold; border: 4px solid #000; text-transform: uppercase; transform: rotate(-5deg); letter-spacing: 5px; animation: textBlink 0.5s infinite;}

        .effect-censor-alert { box-shadow: inset 0 0 100px rgba(255,0,0,0.8); transition: 0.2s; }
        #jailScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(90deg, transparent, transparent 40px, #111 40px, #111 60px), repeating-linear-gradient(0deg, transparent, transparent 150px, #111 150px, #111 170px); z-index: 2500; opacity: 0; pointer-events: none; transition: 0.3s; box-shadow: inset 0 0 100px #000;}
        #jailScreen.active { opacity: 0.8; pointer-events: auto; }

        /* INNE EFEKTY CSS GLOBALNE */
        .effect-glitch { animation: shake 0.1s infinite; filter: hue-rotate(90deg) invert(1); }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(5px, -5px); } }
        .effect-redalert { box-shadow: inset 0 0 150px rgba(255,0,0,0.8); }
        .effect-nuke { filter: brightness(10) contrast(5); }
        .effect-void { background-image: none !important; background-color: #000 !important; filter: brightness(0.5); }
        .effect-abstract { filter: hue-rotate(180deg) saturate(300%) contrast(200%) blur(3px); }
        .effect-flip { transform: rotate(180deg); }
        .effect-blur { filter: blur(15px); }
        .effect-squish { transform: scaleY(0.2); }
        .effect-stretch { transform: scaleY(2); }
        .effect-zoom { transform: scale(1.5); }
        .effect-grayscale { filter: grayscale(100%); }
        .effect-dance { animation: danceAnim 0.4s infinite; }
        @keyframes danceAnim { 0% {transform: translateY(0) rotate(0);} 25% {transform: translateY(-15px) rotate(5deg);} 75% {transform: translateY(15px) rotate(-5deg);} 100% {transform: translateY(0) rotate(0);} }
        .effect-gravity { transform: translateY(-30vh) rotate(5deg); }

        .hud-top { position: fixed; top: 10px; left: 10px; font-size: 12px; font-weight: bold; z-index: 110; color: #fff; text-shadow: 1px 1px #000; display: flex; flex-direction: column; gap: 8px; opacity: 0.9;}
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: red; margin-right: 5px; box-shadow: 0 0 5px red;}
        .status-dot.online { background: #00ff00; box-shadow: 0 0 5px #00ff00; }
        .users-btn { background: rgba(0,0,0,0.6); padding: 5px 10px; border: 1px solid #00f2ff; border-radius: 5px; cursor: pointer; color: #00f2ff; transition: 0.2s;}
        .users-btn:hover { background: #00f2ff; color: #000; }
        .audio-btn { position: fixed; top: 10px; right: 10px; font-size: 24px; z-index: 110; cursor: pointer; text-shadow: 0 0 10px #00f2ff; animation: audioPulse 1.5s infinite;}
    </style>
</head>
<body>
    
    <div class="scanlines"></div>
    <img id="hologramImg" class="hologram-popup" src="" alt="Entity">
    <div id="censorBar"><span>CENZURA</span></div>
    <div id="jailScreen"></div>

    <div class="hud-top">
        <div id="serverStatus"><span id="sDot" class="status-dot"></span><span id="sText">Rozłączono</span></div>
        <div id="usersBtn" class="users-btn hidden" onclick="toggleUsers()">👥 Aktywni: 0</div>
    </div>
    <div class="audio-btn" id="audioBtn" onclick="toggleMusic()">🔇</div>
    
    <audio id="bgMusic" loop><source src="./music/maintheme.mp3" type="audio/mpeg"></audio>
    <audio id="censorAudio"><source src="./music/niewolno.mp3" type="audio/mpeg"></audio>

    <div id="step-1" class="box">
        <h1>CYFROWY CYRK</h1>
        <input type="text" id="nickInput" placeholder="Twoje Imię..." oninput="checkIfCaine()">
        <button id="startBtn" onclick="start(false)">ZALOGUJ</button>
        <div id="admin-login" class="hidden">
            <p style="color: #ff0044; font-weight: bold; font-size: 12px; margin-top: 15px; animation: textBlink 1s infinite;">[ SYSTEM ROOT ]</p>
            <input type="password" id="pinInput" placeholder="PIN: ****">
            <button onclick="loginAdmin()">AUTORYZUJ (CAINE)</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <h1 style="animation: textBlink 1s infinite;">Pobieranie Dusz...</h1>
        <div class="progress-bar-container"><div id="progressFill" class="progress-fill"></div></div>
        <p style="color: #f9e11e; font-size: 12px; margin-top: 10px; font-weight: bold;">Proszę czekać.</p>
    </div>

    <div id="dashboard" class="hidden">
        <div id="caineTerminal" class="hidden">
            <input type="text" id="cmdInputTop" placeholder="Wpisz komendę (np. /przygoda) ...">
            <button onclick="exeTop()">WYKONAJ</button>
        </div>

        <div id="cmdWindow" class="popup-window hidden">
            <div class="cmd-header"><span>💻 BAZA DANYCH ROOT</span><button onclick="toggleCmd()">[X]</button></div>
            <div id="cmdList" class="cmd-list"></div>
        </div>

        <div id="adventureModal" class="popup-window hidden">
            <div class="cmd-header"><span>🤖 MISTRZ GRY AI</span><button onclick="toggleAdventure()">[X]</button></div>
            <div class="cmd-list">
                <p style="color:#00f2ff; margin-top:0;">Wpisz motyw przewodni przygody:</p>
                <input type="text" id="advThemeInput" placeholder="np. Zgubieni w Biurach...">
                <button id="advBtn" onclick="fireAdventure()">WYŚLIJ GRACZOM</button>
            </div>
        </div>

        <div id="usersWindow" class="popup-window hidden">
            <div class="cmd-header"><span>🟢 ZAREJESTROWANE DUSZE</span><button onclick="toggleUsers()">[X]</button></div>
            <div id="usersList" class="cmd-list"></div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div id="chatBox" class="chat-box"></div>
            <div class="chat-controls">
                <input type="text" id="chatInput" placeholder="Napisz coś...">
                <button onclick="handleChat()">WYŚLIJ</button>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const censorAudio = document.getElementById('censorAudio');
        const audioBtn = document.getElementById('audioBtn');
        let audioAllowed = false;
        let isCensoring = false;

        music.volume = 0.3; 
        censorAudio.volume = 1.0; 

        function toggleMusic() {
            if (music.paused) { if(!isCensoring) music.play(); audioBtn.innerText = '🔊'; audioAllowed = true;} 
            else { music.pause(); audioBtn.innerText = '🔇'; }
        }

        document.body.addEventListener('click', () => {
            if(!audioAllowed && music.paused && !isCensoring) { music.play().catch(e => {}); audioBtn.innerText = '🔊'; audioAllowed = true;}
        }, {once: true});

        function triggerNiewolno() {
            if(isCensoring) { censorAudio.currentTime = 0; return; }
            isCensoring = true;
            const wasPlaying = !music.paused;
            music.pause(); 
            censorAudio.play().catch(e => console.log(e));
            document.body.classList.add('effect-censor-alert'); 
            censorAudio.onended = () => {
                isCensoring = false; document.body.classList.remove('effect-censor-alert');
                if (wasPlaying && audioAllowed) music.play(); 
            };
        }

        // --- MQTT & SYSTEM 0.1s ---
        let mqtt; 
        const topic = "cyfrowycyrk/globalchat/final_v15"; 
        let user = ""; let isAdmin = false; let userColor = `hsl(${Math.floor(Math.random()*360)}, 80%, 65%)`;
        let activeUsers = {}; 

        // STAN PRZYGODY LORE I WOREK LOSUJĄCY
        let activeAdventure = false;
        let currentAdvResults = {};
        let advPool = [];

        // 6 POTĘŻNYCH SZABLONÓW PRZYGÓD
        const loreTemplates = [
            {
                text: "🎪 CYFROWA PRZYGODA: \"{THEME}\" 🎪\n\nKorytarze Namiotu wydają się dziś węższe. {GROUP_TEXT} Nagle podłoga pod waszymi stopami zaczyna przypominać glitczującą się szachownicę. Z oddali słychać obłąkańczy śmiech... to Zabstraktyzowany Kaufmo!\nCo robicie?!\n\nA) Rzucacie w Kaufmo przypadkowym Gloinkiem.\nB) Próbujecie zhakować panel podłogowy.\nC) Udajecie Abstrakcję, wymachując rękami.\nD) Skaczecie prosto w Pustkę (The Void).",
                res: {
                    "A": "Gloink zostaje wchłonięty, a potwór patrzy na Was z wyrzutem. Uciekacie, ale gubicie wirtualne buty!",
                    "B": "Podłoga pęka i wpadacie prosto do basenu z cyfrowymi piłeczkami. Caine jest zły, że zrobiliście bałagan.",
                    "C": "Potwór patrzy na Was, puka się w głowę i odchodzi. Wasz plan był tak głupi, że aż zadziałał!",
                    "D": "Spadacie i spadacie... Caine musi użyć komendy /noclip, by Was wyciągnąć. -10 pkt godności."
                }
            },
            {
                text: "🚪 KOSZMAR WYJŚCIA: \"{THEME}\" 🚪\n\nPrzechadzacie się po Cyrku, gdy nagle widzicie... Czerwone drzwi z napisem 'WYJŚCIE'. Otwieracie je i wpadacie do nieskończonych biur. {GROUP_TEXT} Pomni siedzi w kącie panikując. Nagle słychać kroki cyfrowego potwora!\nJak reagujecie?!\n\nA) Łapiecie Pomni i biegniecie na oślep.\nB) Rozbijacie jarzeniówki, żeby stworzyć ciemność.\nC) Próbujecie przekupić potwora wirtualną kanapką.\nD) Zamykacie oczy i krzyczycie 'TO TYLKO VR!'.",
                res: {
                    "A": "Wpadacie na płaską teksturę ściany. Potwór dogania Was... ale to tylko Jax w strasznym kostiumie!",
                    "B": "W ciemności wpadacie na Kingera, który zbudował tu tajny fort. Przynajmniej żyjecie!",
                    "C": "Potwór zjada kanapkę. Okazuje się, że to Caine testował nowy silnik NPC.",
                    "D": "Twój krzyk aktywuje Bubble'a, który pożera potwora, po czym pęka. Triumf!"
                }
            },
            {
                text: "🐛 INWAZJA: \"{THEME}\" 🐛\n\nKatastrofa w Namiocie! Królowa Gloinków obudziła się! {GROUP_TEXT} Jax ukradł klucze do pokoi i zamknął się w wieży. Zooble znowu została rozebrana na części i jej noga kica gdzieś w oddali. Caine'a nie ma!\nJak uratujecie sytuację?!\n\nA) Używacie Gangle jako liny, by wejść na wieżę.\nB) Rzucacie się w tłum Gloinków ratować ramię Zooble.\nC) Wyzywacie Królową Gloinków na Dance Battle.\nD) Chowacie się u Kingera i czekacie.",
                res: {
                    "A": "Gangle płacze, bo pękła jej maska, ale dajecie radę! Jax oddaje klucze. Jesteście bohaterami!",
                    "B": "Gloinki oblepiają Was całkowicie! Stajecie się wielką kulą toczącą się po Cyrku.",
                    "C": "Zaczynacie tańczyć Breakdance! Królowa jest w szoku i ogłasza Was nowymi lordami owadów!",
                    "D": "Wasz pokój zostaje zasypany Gloinkami. Będziecie w nich spać przez najbliższe 3 wirtualne tygodnie."
                }
            },
            {
                text: "🌊 USTERKA NA JEZIORZE: \"{THEME}\" 🌊\n\nCaine wysłał Was nad Cyfrowe Jezioro na 'relaks'. {GROUP_TEXT} Woda nagle zmienia kolor na neonowo-zielony, a tekstury zaczynają się rozmazywać. Z głębin wyłania się gigantyczne ramię z kodem binarnym!\nSzybko, co robicie?!\n\nA) Próbujecie wypić jezioro, żeby zniszczyć potwora.\nB) Wołacie Bubble'a na pomoc.\nC) Rzucacie Jaxem w macki potwora.\nD) Uciekacie na wirtualnej motorówce.",
                res: {
                    "A": "Twój awatar dostaje błędu przepełnienia bufora. Zaczynasz świecić w ciemności!",
                    "B": "Bubble pojawia się, mówi 'Smacznego!' i zlizuje kod z macki. Potwór znika.",
                    "C": "Jax w locie rzuca ripostą, a macka odrzuca go z powrotem na brzeg. Przynajmniej było zabawnie.",
                    "D": "Motorówka wbija się w niewidzialną ścianę mapy. Utknęliście w teksturze góry."
                }
            },
            {
                text: "🎡 KOSZMARNY KARNAWAŁ: \"{THEME}\" 🎡\n\nCyrkowe Wesołe Miasteczko zwariowało. {GROUP_TEXT} Karuzele kręcą się z prędkością światła, a z głośników leci dziwna, odwrócona muzyka. Zauważacie, że z Namiotu Luster wyszedł ktoś, kto wygląda DOKŁADNIE tak samo jak wy, ale ma czerwone oczy!\nJak postąpicie?!\n\nA) Wyzywacie klony na pojedynek na spojrzenia.\nB) Hakujecie system zasilania karuzeli.\nC) Udajecie manekiny, żeby ich zmylić.\nD) Pytacie klonów, czy mają pożyczyć 5 wirtualnych dolców.",
                res: {
                    "A": "Klony mrugają pierwsze! Z żalu rozpadają się na piksele. Wygraliście psychologiczną wojnę.",
                    "B": "Zamiast wyłączyć karuzelę, włączacie tryb 'Turbo'. Wszyscy wymiotują cyfrowym konfetti.",
                    "C": "Klony podchodzą, malują wam wąsy cyfrowym markerem i odchodzą. Sukces, ale z hańbą.",
                    "D": "Klony patrzą z obrzydzeniem, mówią, że jesteście spłukani nawet w VR i wracają do lustra."
                }
            },
            {
                text: "🌑 PIWNICA: \"{THEME}\" 🌑\n\nZeszliście za głęboko. {GROUP_TEXT} W Piwnicy leżą dziesiątki wyciszonych dusz. Nagle gasną jedyne jarzeniówki. W absolutnej ciemności słyszycie cichy szept: 'Caine kłamał...'.\nCo robicie w mroku?!\n\nA) Zapalacie wirtualną latarkę z ekwipunku.\nB) Płaczecie i wzywacie Ragathę.\nC) Próbujecie wejść w interakcję z wyciszonymi ciałami.\nD) Krzyczycie: 'Caine, wiemy, co ukrywasz!'.",
                res: {
                    "A": "Światło ukazuje Jaxa ze straszną maską. 'Ale daliście się nabrać!' - śmieje się i ucieka.",
                    "B": "Ragatha nie przychodzi, ale Kinger rzuca wam z góry linę zrobioną z prześcieradeł. Uratowani!",
                    "C": "Wyciszone ciało nagle otwiera jedno oko i daje wam 'kciuk w górę'. Przerażające, ale miłe.",
                    "D": "Ekran zamraża się, pojawia się wielki czerwony błąd i po chwili respawnujecie się w swoich pokojach. Caine usłyszał."
                }
            }
        ];

        function fillAdvPool() {
            advPool = [0, 1, 2, 3, 4, 5];
            advPool.sort(() => Math.random() - 0.5); // Tasowanie przygód
        }

        const badWords = [ "kurw", "kurv", "jeb", "chuj", "huj", "pierdol", "pierdal", "piedol", "piedal", "spierd", "wypierd", "wypied", "zajeb", "zjeb", "dziwk", "suka", "szmat", "cwel", "pedał", "pedal", "pizd", "fiut", "rucha", "fuck", "shit", "bitch", "debil", "idiot", "kurna", "psiawoker" ];

        function updateStatus(online) {
            const dot = document.getElementById('sDot'); const txt = document.getElementById('sText');
            if(online) { dot.classList.add('online'); txt.innerText = "Sieć: OK"; } else { dot.classList.remove('online'); txt.innerText = "Szukanie..."; }
        }

        function initMQTT() {
            const clientId = "Cyrk_" + Math.random().toString(16).slice(2, 12);
            mqtt = new Paho.MQTT.Client("broker.emqx.io", 8084, clientId);
            mqtt.onConnectionLost = () => { updateStatus(false); setTimeout(initMQTT, 3000); };
            mqtt.onMessageArrived = (m) => {
                try {
                    const d = JSON.parse(m.payloadString);
                    if(d.type === "chat") {
                        showMsg(d.nick, d.text, d.color, d.admin);
                        
                        // NASŁUCHIWANIE ODPOWIEDZI NA PRZYGODĘ
                        if(isAdmin && activeAdventure) {
                            let ans = d.text.trim().toUpperCase();
                            if(['A','B','C','D'].includes(ans)) {
                                sendData({type: "sys", text: `> WYNIK DLA [${d.nick}] -> Wybrano ${ans}:\n${currentAdvResults[ans]}`});
                                activeAdventure = false; 
                            }
                        }

                    }
                    else if(d.type === "sys") showSys(d.text);
                    else if(d.type === "cmd") runEff(d.cmd);
                    else if(d.type === "ping") {
                        activeUsers[d.nick] = { time: Date.now(), isAdmin: d.admin };
                    }
                } catch(e) {}
            };
            mqtt.connect({
                useSSL: true, timeout: 5,
                onSuccess: () => {
                    updateStatus(true); mqtt.subscribe(topic);
                    sendData({type:"sys", text: isAdmin ? "👑 CAINE PRZEJĄŁ SYSTEM 👑" : `[${user}] dołączył do Cyrku.`});
                    setInterval(() => { sendData({type: "ping", nick: user, admin: isAdmin}); }, 1000);
                    activeUsers[user] = { time: Date.now(), isAdmin: isAdmin };
                },
                onFailure: () => { updateStatus(false); }
            });
        }

        // RADAR 0.1s
        setInterval(() => {
            const now = Date.now();
            let changed = false;
            for(let nick in activeUsers) {
                if(now - activeUsers[nick].time > 3000) { 
                    delete activeUsers[nick]; changed = true;
                }
            }
            updateActiveUsersUI();
        }, 100);

        function updateActiveUsersUI() {
            const uList = document.getElementById('usersList'); const uBtn = document.getElementById('usersBtn');
            let html = ""; let count = 0;
            for(let nick in activeUsers) {
                count++;
                let icon = activeUsers[nick].isAdmin ? "👑" : "👤";
                let color = activeUsers[nick].isAdmin ? "#ff0044" : "#00f2ff";
                html += `<div><span style="color:${color}; font-weight:bold;">${icon} ${nick}</span> <span style="float:right; color:#00ff00;">● Online</span></div>`;
            }
            if(uList.innerHTML !== html) uList.innerHTML = html; 
            uBtn.innerText = `👥 Aktywni: ${count}`;
        }

        function sendData(obj) { if(mqtt && mqtt.isConnected()) { const msg = new Paho.MQTT.Message(JSON.stringify(obj)); msg.destinationName = topic; mqtt.send(msg); } }

        function checkIfCaine() { const v = document.getElementById('nickInput').value.trim().toLowerCase(); if(v === 'caine') { document.getElementById('startBtn').classList.add('hidden'); document.getElementById('admin-login').classList.remove('hidden'); } else { document.getElementById('startBtn').classList.remove('hidden'); document.getElementById('admin-login').classList.add('hidden'); } }
        function loginAdmin() { if(document.getElementById('pinInput').value === "2222") start(true); else { alert("ODMOWA DOSTĘPU."); document.getElementById('pinInput').value = "";} }

        function start(adminState) {
            isAdmin = adminState; user = (isAdmin ? "CAINE" : (document.getElementById('nickInput').value.trim() || "Zguba")).toUpperCase();
            document.getElementById('step-1').classList.add('hidden'); document.getElementById('step-2').classList.remove('hidden');
            fillAdvPool(); // Przygotuj przygody
            initMQTT(); populateCmdWindow();
            let p = 0; const fill = document.getElementById('progressFill');
            const interval = setInterval(() => { p += 5; fill.style.width = p + "%"; if(p >= 100) { clearInterval(interval); document.getElementById('step-2').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('usersBtn').classList.remove('hidden'); if(isAdmin) { document.getElementById('caineTerminal').classList.remove('hidden'); } } }, 60);
        }

        function censorText(text) {
            let safe = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            badWords.forEach(word => {
                const spamPattern = word.split('').join('+') + "+[a-ząćęłńóśźż]*";
                const regex = new RegExp(spamPattern, "gi");
                safe = safe.replace(regex, `<img src="./images/censure.jpg" class="inline-censor">`);
            });
            return safe;
        }

        function showMsg(nick, text, color, isCaine) {
            const box = document.getElementById('chatBox');
            const processedText = censorText(text); 
            const className = isCaine ? "msg caine" : "msg";
            const nickStyle = isCaine ? "" : `style="color:${color};"`;
            box.innerHTML += `<div class="${className}"><span class="nick" ${nickStyle}>${nick}:</span> <span class="text">${processedText}</span></div>`;
            requestAnimationFrame(() => { box.scrollTop = box.scrollHeight; });

            if(processedText.includes('class="inline-censor"')) {
                triggerNiewolno();
                setTimeout(() => { showSys("⚠️ SYSTEM OCHRONY CYRKU: Wykryto nieautoryzowane słownictwo!"); }, 500);
            }
        }

        function showSys(text) { const box = document.getElementById('chatBox'); box.innerHTML += `<div class="msg sys" style="white-space: pre-wrap; text-align: left;">${text}</div>`; requestAnimationFrame(() => { box.scrollTop = box.scrollHeight; }); }

        function handleChat() { const input = document.getElementById('chatInput'); const text = input.value.trim(); if(!text) return; if(isAdmin && text.startsWith('/')) { procCmd(text); input.value=""; return; } sendData({type:"chat", nick:user, text:text, color:userColor, admin:isAdmin}); input.value = ""; }
        function exeTop() { const input = document.getElementById('cmdInputTop'); let text = input.value.trim(); if(!text) return; if(!text.startsWith('/')) text = '/' + text; procCmd(text); input.value = ""; }

        const effectList = ["bubble", "gloink", "pomni", "glitch", "redalert", "nuke", "censor", "void", "abstract", "flip", "shake", "blur", "squish", "stretch", "dance", "zoom", "grayscale", "confetti", "jail", "unjail", "gravity"];
        const loreCommands = [ { c: "/ragatha", d: "Ragatha próbuje utrzymać wszystkich w ryzach." }, { c: "/jax", d: "Jax uśmiecha się podejrzanie..." }, { c: "/exit", d: "BŁĄD: DRZWI WYJŚCIOWE NIE ISTNIEJĄ." } ];

        function populateCmdWindow() {
            const list = document.getElementById('cmdList');
            let html = `<div><span class="cmd-real">/przygoda</span> <span class="cmd-desc">Otwiera Generator Przygód LORE AI.</span></div>`;
            html += `<div><span class="cmd-real">/cmd</span> <span class="cmd-desc">Pokazuje tę listę.</span></div>`;
            html += `<div><span class="cmd-real">/clear</span> <span class="cmd-desc">Czyści czat (lokalnie).</span></div>`;
            effectList.forEach(e => html += `<div><span class="cmd-real">/${e}</span> <span class="cmd-desc">Globalny efekt wizualny.</span></div>`);
            loreCommands.forEach(l => html += `<div><span class="cmd-real">${l.c}</span> <span class="cmd-desc">Komunikat systemowy.</span></div>`);
            list.innerHTML = html;
        }

        function toggleCmd() { document.getElementById('cmdWindow').classList.toggle('hidden'); }
        function toggleUsers() { document.getElementById('usersWindow').classList.toggle('hidden'); }
        function toggleAdventure() { document.getElementById('adventureModal').classList.toggle('hidden'); }

        // GENERATOR PRZYGÓD TADC (Z ADAPTACJĄ DUSZ)
        function fireAdventure() {
            const theme = document.getElementById('advThemeInput').value.trim() || "Zgubieni w Kodzie";
            toggleAdventure(); 
            
            // Ile osób gra? Zabezpieczenie minimum 1.
            const pCount = Math.max(1, Object.keys(activeUsers).length);
            const groupText = pCount === 1 ? "Jesteś tu zupełnie SAM, bez nadziei na ratunek." : `Jest was tu dokładnie ${pCount} przerażonych dusz, tłoczących się w strachu.`;
            
            // Losuj z puli bez powtórzeń
            if(advPool.length === 0) fillAdvPool(); // Jeśli pusto, napełnij i przetasuj
            
            const templateIndex = advPool.pop(); // Wyciągnij ostatnią liczbę z potasowanej tablicy
            const template = loreTemplates[templateIndex];
            
            // Zastąp zmienne w tekście
            const finalAdvText = template.text
                .replace("{THEME}", theme.toUpperCase())
                .replace("{GROUP_TEXT}", groupText) + "\n\n[Wpisz A, B, C lub D na czacie!]";
            
            currentAdvResults = template.res;
            activeAdventure = true; 
            sendData({type:"sys", text: finalAdvText});
        }

        function procCmd(cmd) {
            cmd = cmd.toLowerCase();
            if(cmd === '/cmd' || cmd === '/help') { toggleCmd(); return; }
            if(cmd === '/przygoda') { toggleAdventure(); return; } 
            if(cmd === '/clear') { document.getElementById('chatBox').innerHTML = ""; return; }
            const foundEffect = effectList.find(e => cmd.includes(e));
            if(foundEffect) { sendData({type:"cmd", cmd:foundEffect}); sendData({type:"sys", text: `> CAINE AKTYWOWAŁ MODUŁ: [ ${foundEffect.toUpperCase()} ]`}); return;}
            const foundLore = loreCommands.find(l => l.c === cmd);
            if(foundLore) { sendData({type:"sys", text: `> SYSTEM: ${foundLore.d}`}); return; }
            showSys("> Błąd: Moduł nie istnieje. Wpisz /cmd.");
        }

        function createFallingEntities(type) {
            const container = document.body; const count = type === "gloink" ? 25 : 70;
            for(let i = 0; i < count; i++) {
                const entity = document.createElement(type === "gloink" ? 'img' : 'div');
                if(type === "gloink") {
                    const num = Math.floor(Math.random() * 3) + 1; entity.src = `./images/gloink${num}.jpg`; entity.classList.add('falling-gloink');
                    const size = Math.random() * 40 + 40; entity.style.width = size + 'px'; entity.style.height = size + 'px';
                } else {
                    entity.classList.add('falling-confetti'); entity.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 70%)`;
                }
                entity.style.left = Math.random() * 100 + 'vw'; entity.style.animationDuration = (Math.random() * 2 + 2) + 's'; entity.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(entity); setTimeout(() => entity.remove(), 4000); 
            }
        }

        function runEff(cmd) {
            const b = document.body; const h = document.getElementById('hologramImg');
            const c = document.getElementById('censorBar'); const chatCont = document.getElementById('chatContainer');
            const jail = document.getElementById('jailScreen');
            
            if(cmd === "bubble") { h.src = './images/bubble.jpg'; h.classList.add('active'); setTimeout(() => h.classList.remove('active'), 3000); }
            else if(cmd === "pomni") { h.src = './images/pomni.jpg'; h.classList.add('active'); setTimeout(() => h.classList.remove('active'), 3000); }
            else if(cmd === "gloink") { createFallingEntities("gloink"); }
            else if(cmd === "confetti") { createFallingEntities("confetti"); } 
            else if(cmd === "jail") { jail.classList.add('active'); } 
            else if(cmd === "unjail") { jail.classList.remove('active'); } 
            else if(cmd === "gravity") { chatCont.classList.add('effect-gravity'); setTimeout(() => chatCont.classList.remove('effect-gravity'), 5000); }
            else if(cmd === "censor") { c.classList.add('active'); setTimeout(() => c.classList.remove('active'), 2500); }
            else if(cmd === "glitch") { b.classList.add('effect-glitch'); setTimeout(() => b.classList.remove('effect-glitch'), 2000); }
            else if(cmd === "shake") { b.classList.add('effect-shake'); setTimeout(() => b.classList.remove('effect-shake'), 3000); }
            else if(cmd === "redalert") { b.classList.add('effect-redalert'); setTimeout(() => b.classList.remove('effect-redalert'), 4000); }
            else if(cmd === "nuke") { b.classList.add('effect-nuke'); setTimeout(() => b.classList.remove('effect-nuke'), 1000); }
            else if(cmd === "void") { b.classList.add('effect-void'); setTimeout(() => b.classList.remove('effect-void'), 4000); }
            else if(cmd === "abstract") { b.classList.add('effect-abstract'); setTimeout(() => b.classList.remove('effect-abstract'), 5000); }
            else if(cmd === "flip") { b.classList.add('effect-flip'); setTimeout(() => b.classList.remove('effect-flip'), 5000); }
            else if(cmd === "blur") { b.classList.add('effect-blur'); setTimeout(() => b.classList.remove('effect-blur'), 4000); }
            else if(cmd === "squish") { b.classList.add('effect-squish'); setTimeout(() => b.classList.remove('effect-squish'), 4000); }
            else if(cmd === "stretch") { b.classList.add('effect-stretch'); setTimeout(() => b.classList.remove('effect-stretch'), 4000); }
            else if(cmd === "dance") { b.classList.add('effect-dance'); setTimeout(() => b.classList.remove('effect-dance'), 5000); }
            else if(cmd === "zoom") { b.classList.add('effect-zoom'); setTimeout(() => b.classList.remove('effect-zoom'), 3000); }
            else if(cmd === "grayscale") { b.classList.add('effect-grayscale'); setTimeout(() => b.classList.remove('effect-grayscale'), 5000); }
        }
        
        document.getElementById('chatInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') handleChat(); });
        document.getElementById('cmdInputTop').addEventListener('keypress', function (e) { if (e.key === 'Enter') exeTop(); });
        document.getElementById('nickInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') start(false); });
        document.getElementById('pinInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') loginAdmin(); });
    </script>
