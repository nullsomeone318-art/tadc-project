<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TADC - Digital Gateway (Final)</title>
    <style>
        @keyframes crtFlicker {
            0% { opacity: 0.98; }
            50% { opacity: 0.94; }
            100% { opacity: 1; }
        }

        body { 
            background-color: #050505;
            /* Czysta grafika bez przyciemnień */
            background-image: url('./images/backgrund.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #00f2ff; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            overflow: hidden;
            animation: crtFlicker 0.2s infinite; 
        }

        .hidden { display: none !important; }
        
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        
        .box { 
            position: relative;
            background: rgba(10, 10, 15, 0.9); /* Trochę bardziej solidne tło okienka */
            padding: 40px; 
            border: 2px solid #ff0044;
            border-radius: 12px;
            box-shadow: 0 0 25px #ff0044, inset 0 0 15px rgba(255,0,68,0.3); 
            max-width: 420px; 
            width: 85%; 
            z-index: 10;
            backdrop-filter: blur(5px); 
        }

        .box::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 2px dashed #00f2ff;
            border-radius: 16px;
            z-index: -1;
            opacity: 0.4;
        }

        h1 { color: #f9e11e; text-shadow: 0 0 10px rgba(249, 225, 30, 0.5), 3px 3px #ff0044; text-transform: uppercase; margin-top: 0; font-size: 32px; letter-spacing: 2px;}
        
        input { 
            padding: 15px; margin: 20px 0; background: rgba(0, 0, 0, 0.9); 
            border: 2px solid #00f2ff; color: #00f2ff; font-size: 18px; 
            text-align: center; width: 85%; outline: none; border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }
        input:focus { border-color: #f9e11e; box-shadow: 0 0 15px #f9e11e, inset 0 0 10px rgba(249, 225, 30, 0.3); }
        
        button { 
            padding: 15px 30px; background: linear-gradient(45deg, #ff0044, #cc0036); 
            color: #fff; border: none; font-size: 18px; cursor: pointer; 
            font-weight: bold; text-transform: uppercase; border-radius: 5px;
            border-bottom: 4px solid #66001b; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(255, 0, 68, 0.4);
            width: 100%;
        }
        button:hover { background: #f9e11e; color: #000; border-bottom: 4px solid #b3a00b; transform: translateY(2px); box-shadow: 0 2px 10px rgba(249, 225, 30, 0.6); }

        .progress-bar-container { width: 100%; height: 22px; border: 2px solid #00f2ff; margin-top: 20px; background: #111; border-radius: 12px; overflow: hidden; box-shadow: 0 0 10px #00f2ff; }
        .progress-fill { 
            height: 100%; width: 0%; 
            background: repeating-linear-gradient(45deg, #00f2ff, #00f2ff 10px, #0099ff 10px, #0099ff 20px); 
            transition: width 0.2s; 
        }
        
        .hud { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 14px; color: #f9e11e; font-weight: bold; text-shadow: 2px 2px #000; z-index: 110;}
        .audio-btn { position: fixed; bottom: 15px; left: 20px; font-size: 28px; cursor: pointer; z-index: 110; filter: drop-shadow(0 0 5px #00f2ff); }

        @keyframes glitch { 0% { transform: translate(3px, -3px); } 50% { transform: translate(-3px, 3px); } 100% { transform: translate(0); } }
        .glitch-active { animation: glitch 0.15s infinite; color: #ff0044; font-weight: bold; font-size: 18px; text-shadow: 2px 2px #fff; }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="audio-btn" id="audioBtn" onclick="toggleMusic()">🔇</div>

    <div class="hud">
        <span id="clock">00:00:00</span>
        <span id="network">STATUS: ONLINE</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="./music/maintheme.mp3" type="audio/mpeg">
    </audio>

    <div id="step-1" class="box">
        <h1>CYFROWY CYRK</h1>
        <p style="color: #fff; font-size: 16px;">Podaj imię swojego awatara:</p>
        <input type="text" id="nickInput" placeholder="Twoje imię..." oninput="checkCaine()">
        <br>
        <button id="startBtn" onclick="startTransfer()">DOŁĄCZ DO CYRKU</button>

        <div id="admin-login" class="hidden">
            <p style="color: #ff0044; font-weight: bold; font-size: 14px;">[ WYKRYTO KONTO ADMINISTRATORA ]</p>
            <input type="password" id="pinInput" placeholder="WPROWADŹ PIN...">
            <br>
            <button onclick="loginAdmin()">AUTORYZUJ</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <h1>ŁADOWANIE...</h1>
        <p id="targetName" style="color: #fff; font-size: 20px; font-weight: bold;"></p>
        <div class="progress-bar-container"><div id="progressFill" class="progress-fill"></div></div>
        <p id="loadText" style="color: #f9e11e; font-size: 16px; margin-top: 15px; font-weight: bold;">Inicjalizacja dusz...</p>
    </div>

    <div id="step-3" class="box hidden">
        <h1 style="color: #00f2ff;">TRANSFER OK</h1>
        <p style="color: #fff; font-size: 18px;">Witaj, <span id="finalName" style="color: #f9e11e; font-weight: bold;"></span>!</p>
        <p style="border: 2px dashed #f9e11e; padding: 15px; font-size: 15px; color: #fff; background: rgba(249, 225, 30, 0.1);">Pomyślnie dołączono do Cyfrowego Cyrku. Od teraz nie ma drogi ucieczki.</p>
        <button onclick="location.reload()" style="margin-top: 10px;">RESTART SYSTEMU</button>
    </div>

    <script>
        // --- ZEGAR ---
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // --- MUZYKA ---
        const music = document.getElementById('bgMusic');
        const audioBtn = document.getElementById('audioBtn');
        function toggleMusic() {
            if (music.paused) { music.play(); audioBtn.innerText = '🔊'; }
            else { music.pause(); audioBtn.innerText = '🔇'; }
        }

        // --- LOGIKA FORMULARZA ---
        function checkCaine() {
            const nick = document.getElementById('nickInput').value.toLowerCase();
            if(nick === 'caine') {
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('admin-login').classList.remove('hidden');
            } else {
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('admin-login').classList.add('hidden');
            }
        }

        function loginAdmin() {
            if(document.getElementById('pinInput').value === "2222") {
                startTransfer("CAINE");
            } else { alert("BŁĘDNY PIN! DOSTĘP ODMOWIONY."); }
        }

        // --- CZYSTA ANIMACJA TRANSFERU (BEZ SERWERÓW) ---
        function startTransfer(adminNick) {
            const nick = adminNick || document.getElementById('nickInput').value.trim() || "Nieznajomy";
            
            music.play().catch(() => console.log("Przeglądarka wymaga kliknięcia przed audio"));
            audioBtn.innerText = '🔊';

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('targetName').innerText = "PROFIL: " + nick.toUpperCase();

            let progress = 0;
            const fill = document.getElementById('progressFill');
            const loadText = document.getElementById('loadText');

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 8) + 2;
                if(progress > 100) progress = 100;
                fill.style.width = progress + "%";

                if(progress > 25) loadText.innerText = "Kompresowanie dusz do pakietu .zip...";
                if(progress > 65) loadText.innerText = "Usuwanie śladów ucieczki z Matrixa...";

                if(progress === 100) {
                    clearInterval(interval);
                    loadText.innerHTML = "<span class='glitch-active'>BŁĄD: SEKTOR WYJŚCIA NIEODWRACALNIE USZKODZONY</span>";
                    setTimeout(() => {
                        document.getElementById('step-2').classList.add('hidden');
                        document.getElementById('step-3').classList.remove('hidden');
                        document.getElementById('finalName').innerText = nick.toUpperCase();
                    }, 2500);
                }
            }, 300);
        }
    </script>
</body>
</html>
